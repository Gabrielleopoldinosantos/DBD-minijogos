<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skill Check - DBD Style</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  canvas {
    background: transparent;
  }
  #result {
    color: #eee;
    font-size: 22px;
    letter-spacing: 2px;
    min-height: 32px;
    text-transform: uppercase;
  }
  #score {
    color: #888;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #hint {
    color: #555;
    font-size: 13px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" width="360" height="360"></canvas>
  <div id="result">Pressione ESPAÇO para começar</div>
  <div id="score">Acertos: 0/6 | Sucessos: 0 | Falhas: 0</div>
  <div id="hint">Aperte ESPAÇO quando a agulha vermelha passar pela área branca</div>
  <a id="wiggleBtn" href="wiggle.html" style="
      margin-top: 10px;
      padding: 10px 22px;
      background: #111;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    "
    onmouseover="this.style.background='#222'; this.style.borderColor='#888';"
    onmouseout="this.style.background='#111'; this.style.borderColor='#444';"
  >Ir para Wiggle</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resultEl = document.getElementById('result');
const scoreEl = document.getElementById('score');

const CX = canvas.width / 2;
const CY = canvas.height / 2;
const RADIUS = 140;

let state = 'idle'; // idle, running, feedback
let needleAngle = -Math.PI / 2; // começa no topo
let speed = 0.045; // radianos por frame
let zoneStart = 0;
let zoneWidth = 0;
let greatStart = 0;
let greatWidth = 0;
let hits = 0;
let hitCount = 0;
let successCount = 0;
let failCount = 0;
const HITS_NEEDED = 6;
let particles = [];
let feedbackTimer = 0;
let feedbackColor = '#fff';
let feedbackText = '';

function randomZone() {
  // largura da zona normal (branca) entre ~18 e 30 graus
  zoneWidth = (Math.random() * 0.32 + 0.28);
  zoneStart = Math.random() * Math.PI * 2;

  // zona "great" menor dentro da zona normal (dourada)
  greatWidth = zoneWidth * 0.35;
  greatStart = zoneStart + (zoneWidth - greatWidth) * Math.random();

  // dificuldade aumenta um pouco a cada acerto
  speed = 0.060 + Math.min(hits * 0.002, 0.03);
}

function normalizeAngle(a) {
  const twoPi = Math.PI * 2;
  a = a % twoPi;
  if (a < 0) a += twoPi;
  return a;
}

function angleInZone(angle, start, width) {
  angle = normalizeAngle(angle);
  const s = normalizeAngle(start);
  const e = normalizeAngle(start + width);
  if (s < e) {
    return angle >= s && angle <= e;
  } else {
    // zona cruza o 0
    return angle >= s || angle <= e;
  }
}

function drawZoneOutline(startAngle, width, color, r, thickness) {
  const rInner = r - thickness / 2;
  const rOuter = r + thickness / 2;

  ctx.lineWidth = 2;
  ctx.strokeStyle = color;

  ctx.beginPath();
  ctx.arc(CX, CY, rOuter, startAngle, startAngle + width);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(CX, CY, rInner, startAngle, startAngle + width);
  ctx.stroke();

  function tick(angle) {
    const x1 = CX + Math.cos(angle) * rInner;
    const y1 = CY + Math.sin(angle) * rInner;
    const x2 = CX + Math.cos(angle) * rOuter;
    const y2 = CY + Math.sin(angle) * rOuter;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  tick(startAngle);
  tick(startAngle + width);
}

function drawArc(startAngle, width, color, lineWidth, r) {
  ctx.beginPath();
  ctx.arc(CX, CY, r, startAngle, startAngle + width);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'butt';
  ctx.stroke();
}

function spawnExplosion(x, y) {
  const count = 28;
  particles = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 28 + Math.random() * 12,
      maxLife: 40,
      size: Math.random() * 3 + 2,
      color: Math.random() > 0.5 ? '#ff4d3d' : '#ff9d3d'
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.94;
    p.vy *= 0.94;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // círculo base (trilho externo)
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.stroke();

  if (state === 'running' || state === 'feedback') {
    // zona de sucesso: transparente com borda branca
    drawZoneOutline(zoneStart, zoneWidth, 'rgba(255,255,255,0.9)', RADIUS, 14);
    // zona perfeita: branco sólido
    drawArc(greatStart, greatWidth, '#ffffff', 10, RADIUS);
  }

  // agulha vermelha
  if (state === 'running') {
    const nx = CX + Math.cos(needleAngle) * RADIUS;
    const ny = CY + Math.sin(needleAngle) * RADIUS;
    const nx2 = CX + Math.cos(needleAngle) * (RADIUS - 24);
    const ny2 = CY + Math.sin(needleAngle) * (RADIUS - 24);
    ctx.beginPath();
    ctx.moveTo(nx2, ny2);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = '#ff2b2b';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // flash de feedback preenchendo o círculo interno
  if (state === 'feedback') {
    ctx.beginPath();
    ctx.arc(CX, CY, RADIUS - 30, 0, Math.PI * 2);
    ctx.fillStyle = feedbackColor;
    ctx.globalAlpha = Math.max(0, feedbackTimer / 20) * 0.15;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // texto central "ESPAÇO"
  ctx.font = 'bold 20px Segoe UI, Arial';
  ctx.fillStyle = '#eee';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (state === 'running') {
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 6;
    ctx.strokeRect(CX - 65, CY - 18, 130, 36);
    ctx.fillStyle = '#000';
    ctx.fillRect(CX - 65, CY - 18, 130, 36);
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 2;
    ctx.strokeRect(CX - 65, CY - 18, 130, 36);
    ctx.fillStyle = '#eee';
    ctx.fillText('ESPAÇO', CX, CY + 1);
  } else if (state === 'feedback') {
    ctx.font = 'bold 26px Segoe UI, Arial';
    ctx.fillStyle = feedbackColor;
    ctx.fillText(feedbackText, CX, CY);
  }

  drawParticles();
}

function loop() {
  updateParticles();
  if (state === 'running') {
    needleAngle += speed;
    draw();
  } else if (state === 'feedback') {
    feedbackTimer--;
    draw();
    if (feedbackTimer <= 0) {
      startCheck();
    }
  } else {
    draw();
  }
  requestAnimationFrame(loop);
}

function startCheck() {
  state = 'running';
  needleAngle = -Math.PI / 2;
  randomZone();
  resultEl.textContent = '';
}

function showFeedback(text, color) {
  state = 'feedback';
  feedbackTimer = 24;
  feedbackText = text;
  feedbackColor = color;
  resultEl.textContent = text;
  resultEl.style.color = color;
}

function updateScore() {
  scoreEl.textContent = `Acertos: ${hitCount}/${HITS_NEEDED} | Sucessos: ${successCount} | Falhas: ${failCount}`;
}

function handleSpace() {
  if (state === 'idle') {
    startCheck();
    return;
  }
  if (state !== 'running') return;

  if (angleInZone(needleAngle, greatStart, greatWidth)) {
    hits++;
    hitCount += 2;
    showFeedback('PERFEITO!', '#ffffff');
  } else if (angleInZone(needleAngle, zoneStart, zoneWidth)) {
    hits++;
    hitCount += 1;
    showFeedback('ACERTOU', '#7CFC7C');
  } else {
    failCount += 1;
    const nx = CX + Math.cos(needleAngle) * RADIUS;
    const ny = CY + Math.sin(needleAngle) * RADIUS;
    spawnExplosion(nx, ny);
    showFeedback('ERROU', '#ff4d4d');
  }

  while (hitCount >= HITS_NEEDED) {
    hitCount -= HITS_NEEDED;
    successCount++;
  }

  updateScore();
}

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleSpace();
  }
});

draw();
requestAnimationFrame(loop);
</script>
</body>
</html>
